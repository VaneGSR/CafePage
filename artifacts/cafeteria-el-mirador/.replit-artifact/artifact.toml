kind = "web"
previewPath = "/"
title = "Cafetería El Mirador"
version = "1.0.0"
id = "artifacts/cafeteria-el-mirador"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22257

[services.development]
run = "pnpm --filter @workspace/cafeteria-el-mirador run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cafeteria-el-mirador", "run", "build" ]
publicDir = "artifacts/cafeteria-el-mirador/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22257"
BASE_PATH = "/"
